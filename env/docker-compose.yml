# GPU 환경: RTX 3090 24GB (Quality-First 2막 구조)
services:
  db:
    image: mariadb:11
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-wagglebot_root}
      MARIADB_DATABASE: wagglebot
      MARIADB_USER: wagglebot
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-wagglebot}
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -u root -p${MARIADB_ROOT_PASSWORD} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  crawler:
    build:
      context: ..
      dockerfile: worker/Dockerfile
    restart: unless-stopped
    volumes:
      - ../worker:/app
      - ../config:/app/config
      - /app/venv
      - /app/__pycache__
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://wagglebot:${MARIADB_PASSWORD:-wagglebot}@db/wagglebot
      CRAWL_INTERVAL_HOURS: ${CRAWL_INTERVAL_HOURS:-1}
      TELEGRAM_HOOK_URL: ${TELEGRAM_HOOK_URL:-http://telegram-bridge:3847/hook}
      TELEGRAM_CRAWL_ALERT: ${TELEGRAM_CRAWL_ALERT:-false}
      TELEGRAM_ALERT_THRESHOLD: ${TELEGRAM_ALERT_THRESHOLD:-100}
    command: python main.py

  fish-speech:
    # OpenAudio S1-mini — 공식 fishaudio/fish-speech S1 커밋(d3df50, 2026-01-08)에서
    # 로컬 빌드한 이미지 (ADR-0005). 사전빌드 태그는 s1-mini 비호환:
    #   server-cuda(rolling)=S2 AutoTokenizer→tiktoken 못읽음, v1.5.1=modded_dac 미지원.
    # 재빌드: scripts/build_fish_speech_s1.sh 참조.
    # 롤백: 이미지를 fishaudio/fish-speech:v1.5.1 로, 체크포인트/엔트리포인트 구 블록 복원.
    image: wagglebot/fish-speech-s1:cuda
    container_name: fish-speech
    restart: unless-stopped
    runtime: nvidia
    ports:
      - "8082:8080"
    volumes:
      # 서브디렉토리만 마운트 — ComfyUI 모델(checkpoints/*)을 컨테이너에 노출하지 않음
      - ../checkpoints/openaudio-s1-mini:/app/checkpoints/openaudio-s1-mini
      # ⚠ assets/voices는 UID 1000 소유여야 함 (validate_env가 /app/references 쓰기 권한 요구)
      - ../assets/voices:/app/references
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - CUDA_VISIBLE_DEVICES=0
      # 이미지 기본값은 s2-pro(4B, VRAM 초과) — S1-mini로 반드시 오버라이드
      - LLAMA_CHECKPOINT_PATH=checkpoints/openaudio-s1-mini
      - DECODER_CHECKPOINT_PATH=checkpoints/openaudio-s1-mini/codec.pth
      - DECODER_CONFIG_NAME=modded_dac_vq
      # COMPILE=1  # torch.compile (시작 느림) — A3 RTF 측정 후 판단
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      # 라우트 독립적 포트 리스닝 검사 (uvicorn은 모델 로드 완료 후 바인딩 → TCP open ≈ ready)
      test: ["CMD-SHELL", "curl -s -o /dev/null --max-time 5 http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s

  comfyui:
    build:
      context: ..
      dockerfile: env/Dockerfile.comfyui
    container_name: comfyui
    restart: unless-stopped
    runtime: nvidia
    ports:
      - "8188:8188"
    volumes:
      - ../checkpoints/ltx-2:/comfyui/models/checkpoints
      - ../checkpoints/text_encoders:/comfyui/models/text_encoders
      - ../checkpoints/latent_upscale_models:/comfyui/models/latent_upscale_models
      - ../checkpoints/loras:/comfyui/models/loras
      - ../checkpoints/diffusion_models:/comfyui/models/diffusion_models
      - ../checkpoints/vae:/comfyui/models/vae
      - ../worker/ai_worker/video/workflows:/comfyui/custom_workflows
      - ../assets/media/tmp/videos:/comfyui/output
    # GGUF Q4 전환 (2026-03-03):
    #   UNet: GGUF Q4(~12.7GB) — --lowvram streaming (FP8 20GB 대비 4x 작은 데이터)
    #   텍스트 인코더: Gemma 3 12B BF16 — CPU 실행 (max_length=256으로 ~3분)
    #   VAE: BF16(~2.3GB)
    # --lowvram: 텍스트 인코더(24.4GB BF16)가 24GB VRAM 초과 → CPU 오프로드 필수
    #   GGUF Q4 UNet은 streaming 데이터량 1/4 → 기존 FP8 대비 전송 속도 4x 향상
    # --fp8_e4m3fn-text-enc: 기본 파이프라인(non-custom-node)용 유지
    command: >-
      python3 main.py
      --listen 0.0.0.0
      --lowvram
      --reserve-vram 2
      --fp8_e4m3fn-text-enc
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      # CUBLAS 버전 일치: pip nvidia-cublas(13.1) + system cublasLt(13.0) 충돌 방지
      - LD_LIBRARY_PATH=/usr/local/lib/python3.11/dist-packages/nvidia/cu13/lib:/usr/local/cuda/lib64
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8188/system_stats').read()"]
      interval: 60s
      timeout: 30s
      retries: 5
      start_period: 300s

  ai_worker:
    build:
      context: ..
      dockerfile: worker/Dockerfile
    restart: unless-stopped
    stop_grace_period: 120s
    volumes:
      - ../worker:/app
      - ../config:/app/config
      - ../assets/media:/app/media
      - ../assets:/app/assets
      - /app/venv
      - /app/__pycache__
      # WSL2: libnvidia-encode.so.1 등 NVENC 라이브러리 마운트
      - /usr/lib/wsl/lib:/usr/lib/wsl/lib:ro
    environment:
      LLM_WORKER_URL: "http://llm-worker:8090"
      # LLM 백엔드 api 선택 시 사용. 비우면 config/credentials.json 의 키 사용
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: all
      # WSL2: NVENC 라이브러리 경로
      LD_LIBRARY_PATH: /usr/lib/wsl/lib
      DATABASE_URL: mysql+pymysql://wagglebot:${MARIADB_PASSWORD:-wagglebot}@db/wagglebot
      MEDIA_DIR: /app/media
      FISH_SPEECH_URL: "http://fish-speech:8080"
      COMFYUI_URL: "http://comfyui:8188"
      VIDEO_GEN_ENABLED: "${VIDEO_GEN_ENABLED:-false}"
      VIDEO_OUTPUT_DIR: "/app/media/tmp/videos"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      db:
        condition: service_healthy
      fish-speech:
        condition: service_healthy
      comfyui:
        condition: service_healthy
      llm-worker:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: python -m ai_worker.core.main

  monitoring:
    build:
      context: ..
      dockerfile: worker/Dockerfile
    restart: unless-stopped
    volumes:
      - ../worker:/app
      - ../config:/app/config
      - /app/venv
      - /app/__pycache__
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://wagglebot:${MARIADB_PASSWORD:-wagglebot}@db/wagglebot
      MONITORING_ENABLED: ${MONITORING_ENABLED:-true}
      HEALTH_CHECK_INTERVAL: ${HEALTH_CHECK_INTERVAL:-300}
      GPU_TEMP_WARNING: ${GPU_TEMP_WARNING:-75}
      GPU_TEMP_CRITICAL: ${GPU_TEMP_CRITICAL:-80}
      GPU_VRAM_WARNING: ${GPU_VRAM_WARNING:-85}
      GPU_VRAM_CRITICAL: ${GPU_VRAM_CRITICAL:-95}
      DISK_USAGE_WARNING: ${DISK_USAGE_WARNING:-80}
      DISK_USAGE_CRITICAL: ${DISK_USAGE_CRITICAL:-90}
      MEMORY_USAGE_WARNING: ${MEMORY_USAGE_WARNING:-85}
      MEMORY_USAGE_CRITICAL: ${MEMORY_USAGE_CRITICAL:-95}
      EMAIL_ALERTS_ENABLED: ${EMAIL_ALERTS_ENABLED:-false}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      ALERT_EMAIL_TO: ${ALERT_EMAIL_TO:-}
      SLACK_ALERTS_ENABLED: ${SLACK_ALERTS_ENABLED:-false}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    command: python -m monitoring.daemon

  telegram-bridge:
    build:
      context: ../telegram
      dockerfile: Dockerfile
    container_name: telegram-bridge
    restart: unless-stopped
    ports:
      - "${HOOKS_PORT:-3847}:3847"
    volumes:
      - ../:/wagglebot:ro
      - ../_request:/wagglebot/_request
      - ../_result:/wagglebot/_result
      - ../telegram/data:/app/data
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      ALLOWED_USER_IDS: ${ALLOWED_USER_IDS}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      WAGGLEBOT_ROOT: /wagglebot
      HOOKS_PORT: "3847"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DAILY_BRIEF_ENABLED: ${DAILY_BRIEF_ENABLED:-false}
      DAILY_BRIEF_CRON: ${DAILY_BRIEF_CRON:-0 9 * * *}

  llm-worker:
    build:
      context: ../worker/llm
    container_name: llm-worker
    restart: unless-stopped
    ports:
      - "8090:8090"
    environment:
      LLM_DEFAULT_MODEL: "claude-haiku-4-5-20251001"
      LLM_REPORT_MODEL: "claude-sonnet-4-6"
      LLM_POOL_SIZE: "${LLM_POOL_SIZE:-100}"
      LLM_QUEUE_CAPACITY: "${LLM_QUEUE_CAPACITY:-500}"
      CLAUDE_BIN: "claude"
    volumes:
      - ${CLAUDE_HOST_CONFIG_DIR:-/home/justant/.claude}:/root/.claude
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  backend:
    build:
      context: ../backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ../config:/app/config
      - ../assets/media:/app/media
      - ../assets/voices:/app/media/voices:ro
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mariadb://db:3306/wagglebot"
      SPRING_DATASOURCE_USERNAME: "wagglebot"
      SPRING_DATASOURCE_PASSWORD: "${MARIADB_PASSWORD:-wagglebot}"
      MEDIA_DIR: "/app/media"
      CONFIG_DIR: "/app/config"
      FRONTEND_URL: "http://frontend:3000"

  frontend:
    build:
      context: ../frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      BACKEND_URL: "http://backend:8080"

  dashboard_worker:
    build:
      context: ..
      dockerfile: worker/Dockerfile
    restart: unless-stopped
    volumes:
      - ../worker:/app
      - ../config:/app/config
      - ../assets/media:/app/media
      - ../assets:/app/assets
      - /app/venv
      - /app/__pycache__
    depends_on:
      db:
        condition: service_healthy
      llm-worker:
        condition: service_healthy
    environment:
      DATABASE_URL: "mysql+pymysql://wagglebot:${MARIADB_PASSWORD:-wagglebot}@db/wagglebot"
      LLM_WORKER_URL: "http://llm-worker:8090"
      # LLM 백엔드 api 선택 시 사용. 비우면 config/credentials.json 의 키 사용
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      FISH_SPEECH_URL: "http://fish-speech:8080"
      MEDIA_DIR: "/app/media"
    command: python -m dashboard_worker.main

volumes:
  mariadb_data:
