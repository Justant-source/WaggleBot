server.port=8090
spring.application.name=llm-worker

llm.claude-bin=${CLAUDE_BIN:claude}
llm.default-model=${LLM_DEFAULT_MODEL:claude-haiku-4-5-20251001}
llm.pool-size=${LLM_POOL_SIZE:100}
llm.queue-capacity=${LLM_QUEUE_CAPACITY:500}

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
